<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90" fill="none">
  <!-- Legs -->
  <line x1="28" y1="62" x2="12" y2="78" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <line x1="40" y1="66" x2="30" y2="82" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="66" x2="90" y2="82" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <line x1="92" y1="62" x2="108" y2="78" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <!-- Left claw (drooping down) -->
  <line x1="22" y1="52" x2="8" y2="64" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <circle cx="5" cy="70" r="10" fill="#f74c00" stroke="#c94a00" stroke-width="2"/>
  <circle cx="13" cy="76" r="7" fill="#f74c00" stroke="#c94a00" stroke-width="2"/>
  <!-- Right claw (drooping down) -->
  <line x1="98" y1="52" x2="112" y2="64" stroke="#c94a00" stroke-width="4" stroke-linecap="round"/>
  <circle cx="115" cy="70" r="10" fill="#f74c00" stroke="#c94a00" stroke-width="2"/>
  <circle cx="107" cy="76" r="7" fill="#f74c00" stroke="#c94a00" stroke-width="2"/>
  <!-- Body -->
  <ellipse cx="60" cy="56" rx="36" ry="24" fill="#f74c00" stroke="#c94a00" stroke-width="2"/>
  <!-- Shell texture -->
  <ellipse cx="60" cy="52" rx="24" ry="14" fill="#e04400" opacity="0.4"/>
  <!-- Eye stalks -->
  <line x1="46" y1="36" x2="42" y2="26" stroke="#c94a00" stroke-width="3" stroke-linecap="round"/>
  <line x1="74" y1="36" x2="78" y2="26" stroke="#c94a00" stroke-width="3" stroke-linecap="round"/>
  <!-- Eyes (sad — looking down) -->
  <circle cx="41" cy="23" r="8" fill="white" stroke="#c94a00" stroke-width="1.5"/>
  <circle cx="79" cy="23" r="8" fill="white" stroke="#c94a00" stroke-width="1.5"/>
  <circle cx="43" cy="25" r="4" fill="#1a1a2e"/>
  <circle cx="81" cy="25" r="4" fill="#1a1a2e"/>
  <circle cx="44" cy="24" r="1.5" fill="white"/>
  <circle cx="82" cy="24" r="1.5" fill="white"/>
  <!-- Worried brows -->
  <path d="M 35 16 Q 41 13 47 16" stroke="#c94a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 73 16 Q 79 13 85 16" stroke="#c94a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Frown -->
  <path d="M 46 72 Q 60 62 74 72" stroke="#c94a00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
</svg>
