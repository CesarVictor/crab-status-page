name: Deploy

on:
  push:
    branches: [main]

env:
  REGION: europe-west1
  REPOSITORY: crab-status-page
  SERVICE: crab-status-page
  IMAGE: crab-status-page
  CLOUDSQL_INSTANCE: cours-ci-cd:europe-west1:crab-status-page
  RUNTIME_SA: cloud-run-runtime@cours-ci-cd.iam.gserviceaccount.com

jobs:
  # ── CI ────────────────────────────────────────────────────────────
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Deploy ────────────────────────────────────────────────────────
  deploy:
    name: Build & deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          docker build -f docker/Dockerfile -t "$IMAGE_URL" .
          docker push "$IMAGE_URL"

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE }} \
            --image="$IMAGE_URL" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --service-account=${{ env.RUNTIME_SA }} \
            --add-cloudsql-instances=${{ env.CLOUDSQL_INSTANCE }} \
            --min-instances=1 \
            --max-instances=1 \
            --memory=512Mi \
            --cpu=1 \
            --no-cpu-throttling \
            --allow-unauthenticated \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},RUST_LOG=info" \
            --quiet
