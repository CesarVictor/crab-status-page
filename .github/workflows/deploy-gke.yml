name: Deploy to GKE

on:
  push:
    branches: [main]

env:
  REGION: europe-west3
  GCP_PROJECT_ID: j11-exo6
  REPOSITORY: crab-status-page
  IMAGE: crab-status-page
  GKE_CLUSTER: crab-status-page
  GKE_ZONE: europe-west3-a

jobs:
  # ── CI ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test

      - name: cargo clippy
        run: cargo clippy -- -D warnings

  # ── Build & Deploy ──────────────────────────────────────────────
  deploy:
    name: Build & deploy to GKE
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"
          docker build -f docker/Dockerfile \
            -t "${IMAGE_URL}:${{ github.sha }}" \
            -t "${IMAGE_URL}:latest" .
          docker push "${IMAGE_URL}:${{ github.sha }}"
          docker push "${IMAGE_URL}:latest"

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --zone ${{ env.GKE_ZONE }} \
            --project ${{ env.GCP_PROJECT_ID }}

      - name: Create or update DATABASE_URL secret
        run: |
          kubectl create secret generic crab-status-page-secrets \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image tag in deployment manifest
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"
          sed -i "s|${IMAGE_URL}:latest|${IMAGE_URL}:${{ github.sha }}|g" kubernetes/deployment.yaml

      - name: Deploy to GKE
        run: kubectl apply -f kubernetes/

      - name: Wait for rollout
        run: kubectl rollout status deployment/crab-status-page --timeout=120s
