services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crab
      POSTGRES_PASSWORD: crab
      POSTGRES_DB: crab_status
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crab -d crab_status"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://crab:crab@db:5432/crab_status
      RUST_LOG: crab_status_page=debug,info
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
